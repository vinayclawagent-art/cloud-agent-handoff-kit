<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="680" viewBox="0 0 1200 680">
  <rect width="1200" height="680" fill="#0b1020"/>
  <text x="60" y="80" fill="#f8fafc" font-family="Inter, Arial" font-size="38" font-weight="700">Cloud Agent Handoff Kit</text>
  <text x="60" y="122" fill="#94a3b8" font-family="Inter, Arial" font-size="18">Source → trial packet → evidence → decision → reusable workflow</text>
  <rect x="70" y="220" width="180" height="120" rx="22" fill="#111827" stroke="#38bdf8" stroke-width="3"/><text x="160" y="275" fill="#e0f2fe" font-family="Inter, Arial" font-size="20" text-anchor="middle">X Signal</text><text x="160" y="305" fill="#94a3b8" font-family="Inter, Arial" font-size="14" text-anchor="middle">captured note</text><rect x="290" y="220" width="180" height="120" rx="22" fill="#111827" stroke="#38bdf8" stroke-width="3"/><text x="380" y="275" fill="#e0f2fe" font-family="Inter, Arial" font-size="20" text-anchor="middle">Packet</text><text x="380" y="305" fill="#94a3b8" font-family="Inter, Arial" font-size="14" text-anchor="middle">real trial</text><rect x="510" y="220" width="180" height="120" rx="22" fill="#111827" stroke="#38bdf8" stroke-width="3"/><text x="600" y="275" fill="#e0f2fe" font-family="Inter, Arial" font-size="20" text-anchor="middle">Evidence</text><text x="600" y="305" fill="#94a3b8" font-family="Inter, Arial" font-size="14" text-anchor="middle">proof links</text><rect x="730" y="220" width="180" height="120" rx="22" fill="#111827" stroke="#38bdf8" stroke-width="3"/><text x="820" y="275" fill="#e0f2fe" font-family="Inter, Arial" font-size="20" text-anchor="middle">Decision</text><text x="820" y="305" fill="#94a3b8" font-family="Inter, Arial" font-size="14" text-anchor="middle">promote/hold</text><rect x="950" y="220" width="180" height="120" rx="22" fill="#111827" stroke="#38bdf8" stroke-width="3"/><text x="1040" y="275" fill="#e0f2fe" font-family="Inter, Arial" font-size="20" text-anchor="middle">Workflow</text><text x="1040" y="305" fill="#94a3b8" font-family="Inter, Arial" font-size="14" text-anchor="middle">skill/repo</text>
  <path d="M 250 280 H 290" stroke="#f59e0b" stroke-width="5" marker-end="url(#a)"/><path d="M 470 280 H 510" stroke="#f59e0b" stroke-width="5" marker-end="url(#a)"/><path d="M 690 280 H 730" stroke="#f59e0b" stroke-width="5" marker-end="url(#a)"/><path d="M 910 280 H 950" stroke="#f59e0b" stroke-width="5" marker-end="url(#a)"/>
  <defs><marker id="a" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#f59e0b"/></marker></defs>
  <text x="60" y="520" fill="#cbd5e1" font-family="Inter, Arial" font-size="21">Evidence rule: do not upgrade claims until screenshots, logs, PRs, or output artifacts are attached.</text>
</svg>
